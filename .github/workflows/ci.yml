name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  make-ci:
    name: make ci
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install documentation tools
        run: |
          curl -L https://github.com/jgm/pandoc/releases/download/3.8.3/pandoc-3.8.3-1-amd64.deb -o /tmp/pandoc.deb
          sudo dpkg -i /tmp/pandoc.deb

      - name: Run shuffled internal/cli evidence suite
        shell: bash
        run: |
          mkdir -p ci-artifacts
          set +e
          go test -json -shuffle=on -timeout=15m ./internal/cli > ci-artifacts/internal-cli.json
          status=$?
          set -e
          seed="$(sed -nE 's/.*-test\.shuffle ([0-9]+).*/\1/p' ci-artifacts/internal-cli.json | head -n 1)"
          if [[ -z "$seed" ]]; then
            seed=unknown
          fi
          printf 'shuffle_seed=%s\nexit_code=%s\n' "$seed" "$status" | tee ci-artifacts/internal-cli-metadata.txt
          exit "$status"

      - name: Upload shuffled internal/cli evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: internal-cli-go-test-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts/
          if-no-files-found: error
          retention-days: 14

      - name: Run make ci
        run: make ci

  real-amq-compatibility:
    name: real AMQ compatibility (${{ matrix.amq-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        amq-version: [v0.42.1, v0.43.1, latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install requested AMQ
        shell: bash
        run: |
          set -euo pipefail
          export GOBIN="$RUNNER_TEMP/amq-bin"
          mkdir -p "$GOBIN"
          go install github.com/avivsinai/agent-message-queue/cmd/amq@${{ matrix.amq-version }}
          "$GOBIN/amq" version

      - name: Run focused real-AMQ compatibility lane
        shell: bash
        env:
          AMQ_SQUAD_REAL_AMQ: ${{ runner.temp }}/amq-bin/amq
          AMQ_SQUAD_REAL_AMQ_VERSION: ${{ matrix.amq-version }}
          AMQ_NO_UPDATE_CHECK: "1"
        run: |
          set -euo pipefail
          "$AMQ_SQUAD_REAL_AMQ" version
          go test ./internal/cli -run '^TestRealAMQCompatibility$' -count=1 -v -timeout=10m

  real-amq-wake-compatibility:
    name: real AMQ wake compatibility (${{ matrix.amq-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        amq-version: [v0.42.1, v0.43.1]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tmux and requested AMQ
        shell: bash
        run: |
          set -euo pipefail
          command -v tmux >/dev/null || brew install tmux
          export GOBIN="$RUNNER_TEMP/amq-bin"
          mkdir -p "$GOBIN"
          go install github.com/avivsinai/agent-message-queue/cmd/amq@${{ matrix.amq-version }}
          tmux -V
          "$GOBIN/amq" version

      - name: Run required real-PTY wake compatibility lane
        shell: bash
        env:
          AMQ_SQUAD_REAL_AMQ: ${{ runner.temp }}/amq-bin/amq
          AMQ_SQUAD_REAL_AMQ_VERSION: ${{ matrix.amq-version }}
          AMQ_NO_UPDATE_CHECK: "1"
        run: |
          set -euo pipefail
          go test ./internal/cli -run '^TestRealAMQWakeCompatibility$' -count=1 -v -timeout=10m
